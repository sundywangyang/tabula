version: 1
plan:
  name: 'P7 打磨阶段'
  max_concurrency: 3
  max_consecutive_failures: 2
  max_cycles: 8
  auto_accept: true
  auto_reject_retries: 1
  verifier_config:
    default_verifiers: [verifier]
    audit_sample_rate: 0.0
    strict_mode: false
tasks:
  - id: p7-infra
    title: 'P7 v1:启动屏 + 自动更新 + 错误日志'
    prompt: |
      ## 背景
      项目根目录: `C:\Users\admin\Desktop\WorkSpaces\MinimaxWS\Beta`

      P6 插件系统已完成。P7 是 v1 的打磨阶段，让 Tabula 从"功能完整"变成"可发布的桌面应用"。

      本任务实现三个 main 进程基础设施：

      ### 1. 启动屏 (Splash Screen)
      - 启动时显示 splash window（带 logo + 加载动画）
      - 渲染窗口 ready 后再关闭 splash，平滑切换
      - Splash 期间可以预加载：扩展发现、设置读取、用户目录扫描

      ### 2. 自动更新 (Auto Update)
      - 集成 `electron-updater` (electron-builder 自带)
      - 主进程检查 GitHub releases 或固定更新源（暂用本地 mock endpoint）
      - 渲染端收到更新通知后弹窗让用户选择
      - 提供"立即更新"和"稍后"两个选项

      ### 3. 错误日志 (Error Logging)
      - 集成 `electron-log`（在 main + renderer 两侧都可用）
      - 捕获 uncaughtException / unhandledRejection 自动写日志
      - 日志文件路径：`<userData>/logs/main.log` 和 `renderer.log`
      - 提供 IPC 通道 `log:get-path` 让渲染端能定位日志文件
      - 用户可在设置页"打开日志目录"

      ### 技术约束
      - 主进程 nodeIntegration: false，contextIsolation: true 不可改变
      - 所有 OS 能力走 `window.tabula.*` 异步调用
      - 日志和更新走 IPC 桥接
      - 启动屏不能阻塞主进程超过 2 秒

      ### 验收标准
      1. `pnpm typecheck` 0 错误
      2. `pnpm build` 0 错误
      3. 启动 splash window 在 main 窗口 ready 后自动关闭
      4. `electron-log` 在 main + renderer 双侧配置
      5. `electron-updater` 检查逻辑存在
      6. IPC 通道 `log:get-path` 注册
      7. 错误日志文件实际生成在 `<userData>/logs/`
      8. 无 regression

      ### 完成后
      写 `deliverable.md` 到 `C:\Users\admin\.mavis\plans\plan_p7_polish\outputs\p7-infra\deliverable.md`
    assigned_to: electron-expert
    verified_by: verifier
    verify_prompt: |
      验证 P7 基础设施：
      1. pnpm typecheck 0 错误
      2. pnpm build 0 错误
      3. splash window 创建逻辑存在
      4. electron-updater 集成（main 进程 import）
      5. electron-log 集成（main + renderer）
      6. log:get-path IPC handler 注册
      7. 错误捕获 uncaughtException 处理存在
      8. 无 regression
    timeout_ms: 2400000
    hang_alert_after_ms: 900000

  - id: p7-shortcuts
    title: 'P7 v1:快捷键自定义 UI'
    prompt: |
      ## 背景
      项目根目录: `C:\Users\admin\Desktop\WorkSpaces\MinimaxWS\Beta`

      Tabula 当前已有大量快捷键硬编码在 main 进程的 keybind manager 中。本任务让用户能在 settings 页自定义快捷键。

      ### 实现内容

      **1. 快捷键配置存储**
      - 使用 electron-store 持久化用户自定义快捷键
      - 优先级：用户自定义 > 内置默认
      - 启动时合并到 main 进程的 keybind manager

      **2. 设置页 UI（apps/renderer/src/features/settings/）**
      - 添加"快捷键"标签页
      - 列出所有可自定义命令 + 当前绑定
      - 点击"重绑定"进入捕获模式（监听下一个键组合）
      - 实时保存到 electron-store

      **3. 命令清单**
      - file.open
      - file.delete
      - tab.new
      - tab.close
      - pane.split-vertical
      - pane.split-horizontal
      - pane.close
      - search.focus
      - preview.toggle
      - theme.toggle
      - settings.open
      - ...（其他主要命令）

      **4. IPC 通道**
      - `shortcuts:get-all` - 列出所有可自定义命令
      - `shortcuts:get-bindings` - 获取当前所有绑定
      - `shortcuts:set-binding` - 设置单个绑定
      - `shortcuts:reset-all` - 重置为默认

      ### 技术约束
      - 渲染端 nodeIntegration: false
      - 走 contextBridge 桥接
      - 快捷键冲突检测（同一组合不能绑两个命令）
      - 系统保留组合（如 Cmd+Q）不允许重新绑定

      ### 验收标准
      1. `pnpm typecheck` 0 错误
      2. `pnpm build` 0 错误
      3. 设置页有"快捷键"标签页
      4. 可列出至少 10 个可自定义命令
      5. 重绑定 UI 存在
      6. 4 个 IPC 通道全部注册
      7. electron-store 持久化逻辑存在
      8. 无 regression

      ### 完成后
      写 `deliverable.md` 到 `C:\Users\admin\.mavis\plans\plan_p7_polish\outputs\p7-shortcuts\deliverable.md`
    assigned_to: developer
    verified_by: verifier
    verify_prompt: |
      验证快捷键 UI：
      1. pnpm typecheck 0 错误
      2. pnpm build 0 错误
      3. 设置页有快捷键标签页
      4. 至少 10 个可自定义命令
      5. 4 个 IPC 通道注册
      6. electron-store 持久化存在
      7. 冲突检测逻辑存在
      8. 无 regression
    timeout_ms: 1800000
    hang_alert_after_ms: 900000

  - id: p7-perf
    title: 'P7 v1:性能基线 (10K 文件 60fps)'
    prompt: |
      ## 背景
      项目根目录: `C:\Users\admin\Desktop\WorkSpaces\MinimaxWS\Beta`

      P7 性能基线：10K 文件滚动 60fps，内存 < 400MB，启动 < 2s。

      ### 实现内容

      **1. 虚拟滚动 (Virtual Scrolling)**
      - 在 `file-list` 组件中实现虚拟滚动
      - 只渲染可见区域内的行（window of 50-100 rows）
      - 滚动时动态更新渲染池
      - 支持 10K+ 条目流畅滚动

      **2. 内存优化**
      - file-list 状态使用不可变更新
      - 大目录分页加载（每页 500 项）
      - 清理已关闭 tab 的状态
      - IPC 传输时使用结构性共享（避免深拷贝）

      **3. 启动时间优化**
      - main 进程启动：异步初始化非关键服务
      - 渲染端：代码分割，懒加载 features
      - 关键路径只加载 panes + file-list

      **4. 性能指标埋点**
      - 启动时间埋点（从 app.whenReady 到 window ready）
      - file-list 渲染时间埋点
      - 内存使用采样（每 10s）
      - IPC 通道 + `perf:report` 让用户查看

      ### 技术约束
      - 渲染端不得新增任何阻塞主线程的同步操作
      - 虚拟滚动必须支持键盘导航（Up/Down/PageUp/PageDown/Home/End）
      - 内存采样不能影响主流程性能

      ### 验收标准
      1. `pnpm typecheck` 0 错误
      2. `pnpm build` 0 错误
      3. file-list 组件有虚拟滚动实现
      4. 滚动 10K 文件不卡顿
      5. 启动时间 < 2s（实际测量）
      6. 内存 < 400MB（实测）
      7. 性能埋点 `perf:report` IPC 通道注册
      8. 无 regression

      ### 完成后
      写 `deliverable.md` 到 `C:\Users\admin\.mavis\plans\plan_p7_polish\outputs\p7-perf\deliverable.md`
    assigned_to: developer
    verified_by: verifier
    verify_prompt: |
      验证性能优化：
      1. pnpm typecheck 0 错误
      2. pnpm build 0 错误
      3. file-list 虚拟滚动实现
      4. 键盘导航支持
      5. 性能埋点存在
      6. perf:report IPC 注册
      7. 内存采样逻辑存在
      8. 无 regression
    timeout_ms: 1800000
    hang_alert_after_ms: 900000
